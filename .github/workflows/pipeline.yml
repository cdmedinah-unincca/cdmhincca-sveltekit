name: Deploy to GitHub Pages

# Determina cuando se ejecuta el pipeline
on:
  push:
    branches: [ main ] # Se ejecuta cuando se hace push a la rama main
  pull_request:
    branches: [ main ] # Se ejecuta cuando se hace pull request a la rama main

jobs:
  # Trabajo 1: Construir la aplicación
  build:
    runs-on: ubuntu-latest # Ejecuta el pipeline en una máquina virtual con Ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Descarga el código del repositorio

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Configura Node.js
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Instala las dependencias

      - name: Build
        run: npm run build # Construye la aplicación

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build # Sube el artifact a GitHub Pages

  # Trabajo 2: Desplegar la aplicación
  deploy:
    environment:
      name: github-pages # Entorno de GitHub Pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions: # Permisos necesarios para desplegar
      contents: read
      pages: write
      id-token: write
    steps: # Pasos para desplegar la aplicación
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4